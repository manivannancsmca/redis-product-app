spring:
  application:
    name: redis-product-app
  datasource:
    # Use the service name 'mysql' from docker-compose
    url: jdbc:mysql://mysql:3306/productdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      # Use the service name 'redis' from docker-compose
      host: redis
      port: 6379
  cache:
    type: redis

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    
