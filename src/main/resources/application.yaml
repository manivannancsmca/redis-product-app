spring:
  application:
    name: redis-product-app
  datasource:
    url: jdbc:mysql://mysql:3306/productdb?createDatabaseIfNotExist=true&useSSL=false
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

  data:
    redis:
      host: redis
      port: 6379

  cache:
    type: redis

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true